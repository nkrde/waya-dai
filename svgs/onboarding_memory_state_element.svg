<svg width="380" height="490" viewBox="0 0 380 490" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    ======================================================================
    WAYAX 1:1 EXACT ONBOARDING CARD COMPONENT - CONFIGURE MEMORY STATE (380px x 490px)
    Strictly extracted and compiled from the provided React DOM HTML snippet:
    - 0% <style> Blocks (Inlined presentation attributes)
    - 0% foreignObject Tags (Figma native compatible)
    - Frosted glass onboarding panel base with 1px highlights
    - 2x2 dynamic button grids for Risk Tolerance & Investment Horizon
    - Active highlight states for "Moderate" and "Short-Term" buttons
    - Access Dashboard action button layout next to Back button
    ======================================================================
  -->

  <defs>
    <!-- Background Satin Panel Glass Gradient -->
    <linearGradient id="onboarding-mem-glass" x1="0" y1="0" x2="380" y2="490" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111318" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#07080b" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Glowing backlight underlay blur -->
    <filter id="onboarding-mem-backlight" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>

    <!-- Card shadow specification -->
    <filter id="onboarding-mem-shadow" x="-10%" y="-5%" width="120%" height="110%">
      <feDropShadow dx="0" dy="16" stdDeviation="32" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <!-- Active button indicator shadow -->
    <filter id="active-btn-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#ffffff" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- ==================== LAYER 1: BACKLIGHT AMBIENCE ==================== -->
  <!-- Ambient background glow (Simulating w-80 h-80 blur-[100px] bg-indigo-500/2) -->
  <circle cx="190" cy="220" r="140" fill="#6366f1" fill-opacity="0.05" filter="url(#onboarding-mem-backlight)"/>

  <!-- ==================== LAYER 2: GLASS CARD BACKDROP ==================== -->
  <rect x="10" y="10" width="360" height="410" rx="24" fill="url(#onboarding-mem-glass)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1.2" filter="url(#onboarding-mem-shadow)"/>
  
  <!-- Specular inner edge highlight -->
  <rect x="10.5" y="10.5" width="359" height="409" rx="23.5" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- ==================== LAYER 3: HEADER SECTION ==================== -->
  <g transform="translate(190, 48)" text-anchor="middle">
    <!-- Main Title with Sparkles vector next to it -->
    <g transform="translate(-10, 0)">
      <text x="0" y="0" font-family="'Inter', sans-serif" font-weight="700" font-size="20" fill="#ffffff" text-anchor="middle">Configure Memory</text>
      
      <!-- lucide-sparkles icon -->
      <g transform="translate(90, -15)" stroke="#6366f1" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="m5.3.8.7 2.7c.1.2.2.3.4.4l2.7.7a.4.4 0 0 1 0 .8l-2.7.7a.5.5 0 0 0-.4.4l-.7 2.7a.4.4 0 0 1-.8 0l-.7-2.7a.5.5 0 0 0-.4-.4L.8 6a.4.4 0 0 1 0-.8l2.7-.7a.5.5 0 0 0 .4-.4L4.6.8a.4.4 0 0 1 .8 0z"/>
        <path d="M10 1v1.6"/>
        <path d="M11 2H9"/>
      </g>
    </g>
    
    <!-- Subtitle with Amit highlighted -->
    <text x="0" y="24" font-family="'Inter', sans-serif" font-weight="500" font-size="12" fill="#cbd5e1" text-anchor="middle">
      Hi <tspan fill="#818cf8" font-weight="700">Amit</tspan>! Set your guidelines.
    </text>
  </g>

  <!-- ==================== LAYER 4: RISK TOLERANCE GRID ==================== -->
  <g transform="translate(30, 94)">
    <text x="4" y="10" font-family="'Inter', sans-serif" font-weight="800" font-size="9.5" fill="#64748b" letter-spacing="0.08em">RISK TOLERANCE</text>
    
    <g transform="translate(0, 20)">
      <!-- Low Button -->
      <g transform="translate(0, 0)">
        <rect width="154" height="28" rx="8" fill="rgba(0, 0, 0, 0.25)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1"/>
        <text x="77" y="18" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#64748b" text-anchor="middle">Low</text>
      </g>
      
      <!-- Moderate Button (Active State Highlighted) -->
      <g transform="translate(166, 0)">
        <rect width="154" height="28" rx="8" fill="rgba(255, 255, 255, 0.1)" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1" filter="url(#active-btn-glow)"/>
        <text x="77" y="18" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#ffffff" text-anchor="middle">Moderate</text>
      </g>

      <!-- High Button -->
      <g transform="translate(0, 36)">
        <rect width="154" height="28" rx="8" fill="rgba(0, 0, 0, 0.25)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1"/>
        <text x="77" y="18" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#64748b" text-anchor="middle">High</text>
      </g>

      <!-- Aggressive Button -->
      <g transform="translate(166, 36)">
        <rect width="154" height="28" rx="8" fill="rgba(0, 0, 0, 0.25)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1"/>
        <text x="77" y="18" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#64748b" text-anchor="middle">Aggressive</text>
      </g>
    </g>
  </g>

  <!-- ==================== LAYER 5: INVESTMENT HORIZON GRID ==================== -->
  <g transform="translate(30, 186)">
    <text x="4" y="10" font-family="'Inter', sans-serif" font-weight="800" font-size="9.5" fill="#64748b" letter-spacing="0.08em">INVESTMENT HORIZON</text>
    
    <g transform="translate(0, 20)">
      <!-- Quick Trade Button -->
      <g transform="translate(0, 0)">
        <rect width="154" height="28" rx="8" fill="rgba(0, 0, 0, 0.25)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1"/>
        <text x="77" y="18" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#64748b" text-anchor="middle">Quick Trade</text>
      </g>
      
      <!-- Short-Term Button (Active State Highlighted) -->
      <g transform="translate(166, 0)">
        <rect width="154" height="28" rx="8" fill="rgba(255, 255, 255, 0.1)" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1" filter="url(#active-btn-glow)"/>
        <text x="77" y="18" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#ffffff" text-anchor="middle">Short-Term</text>
      </g>

      <!-- Medium-Term Button -->
      <g transform="translate(0, 36)">
        <rect width="154" height="28" rx="8" fill="rgba(0, 0, 0, 0.25)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1"/>
        <text x="77" y="18" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#64748b" text-anchor="middle">Medium-Term</text>
      </g>

      <!-- Long-Term Button -->
      <g transform="translate(166, 36)">
        <rect width="154" height="28" rx="8" fill="rgba(0, 0, 0, 0.25)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1"/>
        <text x="77" y="18" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#64748b" text-anchor="middle">Long-Term</text>
      </g>
    </g>
  </g>

  <!-- ==================== LAYER 6: SUBMIT ACTIONS ROW ==================== -->
  <g transform="translate(30, 354)">
    <!-- Back Button -->
    <g transform="translate(0, 0)">
      <rect width="100" height="38" rx="10" fill="transparent" stroke="transparent" stroke-width="1"/>
      <text x="50" y="23" font-family="'Inter', sans-serif" font-weight="700" font-size="12" fill="#64748b" text-anchor="middle">Back</text>
    </g>

    <!-- Access Dashboard Button -->
    <g transform="translate(112, 0)">
      <rect width="208" height="38" rx="10" fill="rgba(255, 255, 255, 0.04)" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1"/>
      
      <!-- Label and Arrow Icon -->
      <g transform="translate(104, 0)">
        <text y="23" font-family="'Inter', sans-serif" font-weight="700" font-size="12" fill="#ffffff" text-anchor="middle">Access Dashboard</text>
        
        <!-- lucide-arrow-right (Indigo-500) -->
        <g transform="translate(60, 11)" stroke="#818cf8" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="2" y1="8" x2="14" y2="8"/>
          <path d="M9 3l5 5-5 5"/>
        </g>
      </g>
    </g>
  </g>

  <!-- ==================== LAYER 7: OUTSIDE NAVIGATION BUTTON ==================== -->
  <text x="190" y="456" font-family="'Inter', sans-serif" font-weight="500" font-size="12" fill="#64748b" text-anchor="middle">Back</text>
</svg>
