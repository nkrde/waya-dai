<svg width="280" height="540" viewBox="0 0 280 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    ======================================================================
    WAYAX 1:1 EXACT LEFT SIDE-CHAT PANEL COMPONENT (280px x 540px)
    Strictly extracted and compiled from the provided React DOM HTML snippet:
    - 0% <style> Blocks (Inlined presentation attributes)
    - 0% foreignObject Tags (Figma native compatible)
    - Premium subsurface frosted glass sidebar panel
    - Custom Lucide Icons: PanelLeft, Plus, Search, Candlestick, PenLine, Trash2, User, ChevronRight
    - Active Badge and Hover state buttons mapped beautifully
    ======================================================================
  -->

  <defs>
    <!-- Background Satin Panel Glass Gradient -->
    <linearGradient id="side-glass-fill" x1="0" y1="0" x2="280" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111318" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#0b0c0f" stop-opacity="0.96"/>
    </linearGradient>

    <!-- Interactive Button/Hover Category Pill Gradients -->
    <linearGradient id="new-chat-border" x1="0" y1="0" x2="256" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>

    <linearGradient id="active-item-border" x1="0" y1="0" x2="256" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Premium Glow Dropshadow for overall panel container -->
    <filter id="side-panel-shadow" x="-10%" y="-5%" width="120%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- ==================== LAYER 1: SIDEBAR BACKDROP CONTAINER ==================== -->
  <rect width="280" height="540" rx="16" fill="url(#side-glass-fill)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1.2" filter="url(#side-panel-shadow)"/>
  
  <!-- Specular inner edge highlight -->
  <rect x="0.5" y="0.5" width="279" height="539" rx="15.5" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- ==================== LAYER 2: HEADER SECTION ==================== -->
  <g id="side-header">
    <!-- Brand container details -->
    <g transform="translate(16, 14)">
      <!-- Mini logo box -->
      <rect width="32" height="32" rx="8" fill="#0d121d" stroke="rgba(51, 65, 85, 0.3)" stroke-width="1"/>
      <image href="https://reduced-beige-7hamqau4r6.edgeone.app/a.png" x="6" y="6" width="20" height="20"/>
      
      <!-- Text label -->
      <text x="42" y="21" font-family="'Inter', sans-serif" font-weight="700" font-size="14" fill="#ffffff" letter-spacing="-0.01em">WayaX</text>
    </g>

    <!-- Close button (PanelLeft Icon) -->
    <g transform="translate(232, 14)">
      <rect width="32" height="32" rx="8" fill="none" stroke="rgba(255, 255, 255, 0.06)" stroke-width="1"/>
      
      <!-- lucide-panel-left -->
      <g transform="translate(8, 8)">
        <rect x="2" y="2" width="16" height="16" rx="2" stroke="#64748b" stroke-width="1.5" fill="none"/>
        <line x1="7" y1="2" x2="7" y2="18" stroke="#64748b" stroke-width="1.5"/>
      </g>
    </g>

    <!-- Divider under header -->
    <line x1="0" y1="60" x2="280" y2="60" stroke="rgba(255, 255, 255, 0.06)" stroke-width="1"/>
  </g>

  <!-- ==================== LAYER 3: ACTION CONTROLS ==================== -->
  <g id="side-controls" transform="translate(12, 72)">
    <!-- "New Advisory Chat" Premium Button -->
    <g>
      <rect width="256" height="38" rx="11" fill="rgba(255, 255, 255, 0.04)" stroke="url(#new-chat-border)" stroke-width="1.2"/>
      
      <!-- Plus Icon -->
      <path d="M102 19h12M108 13v12" stroke="#6366f1" stroke-width="1.8" stroke-linecap="round"/>
      
      <text x="124" y="23" font-family="'Inter', sans-serif" font-weight="600" font-size="11.5" fill="#ffffff">New Advisory Chat</text>
    </g>

    <!-- Custom Search Input Well -->
    <g transform="translate(0, 48)">
      <rect width="256" height="34" rx="10" fill="rgba(255, 255, 255, 0.03)" stroke="rgba(255, 255, 255, 0.06)" stroke-width="1"/>
      
      <!-- lucide-search icon inside -->
      <g transform="translate(12, 9)">
        <circle cx="6" cy="6" r="4.5" stroke="#94a3b8" stroke-width="1.2" fill="none"/>
        <line x1="9.5" y1="9.5" x2="13" y2="13" stroke="#94a3b8" stroke-width="1.2" stroke-linecap="round"/>
      </g>
      
      <text x="36" y="21" font-family="'Inter', sans-serif" font-weight="500" font-size="11.5" fill="#475569">Search conversations...</text>
    </g>
  </g>

  <!-- ==================== LAYER 4: ADVISORY HISTORY ==================== -->
  <g id="side-history" transform="translate(12, 172)">
    <!-- Category label text -->
    <text x="8" y="14" font-family="'Inter', sans-serif" font-weight="700" font-size="9.5" fill="#475569" letter-spacing="0.08em">ADVISORY HISTORY</text>

    <!-- Active Card (Initial Advisory Consult) -->
    <g transform="translate(0, 26)">
      <rect width="256" height="38" rx="11" fill="rgba(255, 255, 255, 0.06)" stroke="url(#active-item-border)" stroke-width="1.2"/>
      
      <!-- Candlestick chart icon inside -->
      <g transform="translate(12, 10)">
        <path d="M6 3v2" stroke="#6366f1" stroke-width="1.2"/>
        <rect x="4" y="5" width="4" height="6" rx="1" fill="#6366f1" stroke="none"/>
        <path d="M6 11v2" stroke="#6366f1" stroke-width="1.2"/>
        
        <path d="M12 2v2" stroke="#6366f1" stroke-width="1.2"/>
        <rect x="10" y="4" width="4" height="8" rx="1" fill="#6366f1" stroke="none"/>
        <path d="M12 12v3" stroke="#6366f1" stroke-width="1.2"/>
        
        <path d="M2 2v12a1 1 0 0 0 1 1h12" stroke="#6366f1" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      </g>

      <!-- History Item Title -->
      <text x="38" y="23" font-family="'Inter', sans-serif" font-weight="600" font-size="11.5" fill="#ffffff">Initial Advisory Consult</text>

      <!-- Edit/Action Buttons layout (Hover simulation) -->
      <g transform="translate(202, 11)">
        <!-- Rename (PenLine Icon) -->
        <g transform="translate(0, 0)">
          <path d="M9 13.5h5" stroke="#64748b" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M13.5 3.5a1 1 0 0 1 1.5 1.5l-8.5 8.5-2.5 1 1-2.5 8.5-8.5z" stroke="#64748b" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        </g>
        
        <!-- Delete (Trash2 Icon) -->
        <g transform="translate(18, 0)">
          <path d="M3 4.5h10M5 4.5V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1.5M6 7.5v4.5M10 7.5v4.5" stroke="#64748b" stroke-width="1.2" stroke-linecap="round"/>
          <rect x="4" y="4.5" width="8" height="9.5" rx="1" stroke="#64748b" stroke-width="1.2" fill="none"/>
        </g>
      </g>
    </g>
  </g>

  <!-- ==================== LAYER 5: PROFILE FOOTER SECTION ==================== -->
  <g id="side-footer" transform="translate(0, 484)">
    <!-- Boundary line dividing section -->
    <line x1="0" y1="0" x2="280" y2="0" stroke="rgba(255, 255, 255, 0.06)" stroke-width="1"/>

    <!-- Profile user card content -->
    <g transform="translate(12, 12)">
      <!-- Avatar capsule background -->
      <rect width="28" height="28" rx="8" fill="rgba(255, 255, 255, 0.04)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1"/>
      
      <!-- lucide-user icon in purple -->
      <g transform="translate(6, 6)">
        <path d="M13 13v-1a3 3 0 0 0-3-3H6a3 3 0 0 0-3 3v1" stroke="#a855f7" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <circle cx="8" cy="5" r="2.5" stroke="#a855f7" stroke-width="1.2" fill="none"/>
      </g>

      <!-- Labels & Tags -->
      <text x="38" y="17" font-family="'Inter', sans-serif" font-weight="600" font-size="11.5" fill="#cbd5e1">Profile</text>
      
      <!-- Active Capsule Badge -->
      <g transform="translate(80, 5)">
        <rect width="38" height="14" rx="3.5" fill="rgba(99, 102, 241, 0.1)" stroke="rgba(99, 102, 241, 0.2)" stroke-width="0.8"/>
        <text x="19" y="10.5" font-family="'Inter', sans-serif" font-weight="800" font-size="8" fill="#818cf8" text-anchor="middle" letter-spacing="0.05em">ACTIVE</text>
      </g>

      <!-- ChevronRight Navigation Link -->
      <path d="M242 10l4 4-4 4" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>
</svg>
