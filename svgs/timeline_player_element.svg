<svg width="260" height="48" viewBox="0 0 260 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    ======================================================================
    WAYAX 1:1 EXACT INTRO ANIMATION TIMELINE PLAYER (260px x 48px)
    Strictly extracted and compiled from the provided React DOM HTML snippet:
    - 0% <style> Blocks (Inlined presentation attributes)
    - 0% foreignObject Tags (Figma native compatible)
    - Translucent black backdrop capsule with 1px highlights
    - Fully vectorized Play/Resume button, Range slider well, and Skip capsules
    ======================================================================
  -->

  <defs>
    <!-- Range Progress Bar Gradient -->
    <linearGradient id="timeline-progress-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>

    <!-- Ambient drop-shadow filter -->
    <filter id="timeline-shadow" x="-10%" y="-15%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- ==================== LAYER 1: BASE CAPSULE BACKDROP ==================== -->
  <!-- Rounded pill base container (252px x 40px, rx=20) -->
  <rect x="4" y="4" width="252" height="40" rx="20" fill="#000000" fill-opacity="0.4" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1" filter="url(#timeline-shadow)"/>
  
  <!-- Specular inner edge highlight -->
  <rect x="4.5" y="4.5" width="251" height="39" rx="19.5" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- ==================== LAYER 2: INTERACTIVE CONTROLS ==================== -->

  <!-- PLAY/RESUME BUTTON -->
  <g transform="translate(8, 8)">
    <circle cx="16" cy="16" r="16" fill="rgba(255, 255, 255, 0.05)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1"/>
    
    <!-- lucide-play icon in white -->
    <path d="M12.5 10.3a1.5 1.5 0 0 1 2.2-1.3l6.5 3.8a1.5 1.5 0 0 1 0 2.6l-6.5 3.8a1.5 1.5 0 0 1-2.2-1.3v-7.6z" fill="#ffffff" stroke="#ffffff" stroke-width="1" stroke-linejoin="round"/>
  </g>

  <!-- TIMELINE PROGRESS WELL -->
  <g transform="translate(48, 8)">
    <!-- Base track line -->
    <rect x="4" y="14" width="80" height="4" rx="2" fill="rgba(255, 255, 255, 0.1)"/>
    
    <!-- Progress fill line (value 0% - width 0px/4px placeholder) -->
    <rect x="4" y="14" width="4" height="4" rx="2" fill="url(#timeline-progress-grad)"/>

    <!-- Thumb dot slider -->
    <circle cx="4" cy="16" r="5" fill="#ffffff" stroke="#818cf8" stroke-width="1.5"/>
    
    <!-- Frame status indicator (1/5) -->
    <text x="94" y="20" font-family="'JetBrains Mono', 'Fira Code', monospace" font-weight="700" font-size="10" fill="#94a3b8" tracking="0.05em">1/5</text>
  </g>

  <!-- SKIP BUTTON -->
  <g transform="translate(176, 8)">
    <!-- Indigo Tinted skip capsule -->
    <rect width="72" height="32" rx="16" fill="rgba(99, 102, 241, 0.2)" stroke="rgba(99, 102, 241, 0.2)" stroke-width="1"/>
    
    <!-- Label and skip-forward icon -->
    <g transform="translate(14, 0)">
      <text x="0" y="20" font-family="'Inter', sans-serif" font-weight="700" font-size="10" fill="#cbd5e1" letter-spacing="0.05em">SKIP</text>
      
      <!-- lucide-skip-forward -->
      <g transform="translate(30, 9)" stroke="#cbd5e1" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2v10"/>
        <path d="M2.5 2.1A1 1 0 0 0 1 3v8a1 1 0 0 0 1.5.9l5.5-3.5a1 1 0 0 0 0-1.8l-5.5-3.5z"/>
      </g>
    </g>
  </g>
</svg>
