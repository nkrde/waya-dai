<svg width="380" height="340" viewBox="0 0 380 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    ======================================================================
    WAYAX 1:1 EXACT ONBOARDING CARD COMPONENT - NAME INPUT STATE (380px x 340px)
    Strictly extracted and compiled from the provided React DOM HTML snippet:
    - 0% <style> Blocks (Inlined presentation attributes)
    - 0% foreignObject Tags (Figma native compatible)
    - Frosted glass onboarding panel base with 1px highlights
    - Name input well featuring "Enter your name" placeholder state
    - Complete action button group featuring "Continue" button layout and Lucide ArrowRight
    - Centered "Back" interactive navigation action at the bottom
    ======================================================================
  -->

  <defs>
    <!-- Background Satin Panel Glass Gradient -->
    <linearGradient id="onboarding-name-glass" x1="0" y1="0" x2="380" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111318" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#07080b" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Glowing backlight underlay blur -->
    <filter id="onboarding-name-backlight" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>

    <!-- Card shadow specification -->
    <filter id="onboarding-name-shadow" x="-10%" y="-5%" width="120%" height="110%">
      <feDropShadow dx="0" dy="16" stdDeviation="32" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- ==================== LAYER 1: BACKLIGHT AMBIENCE ==================== -->
  <!-- Ambient background glow (Simulating w-80 h-80 blur-[100px] bg-indigo-500/2) -->
  <circle cx="190" cy="150" r="120" fill="#6366f1" fill-opacity="0.05" filter="url(#onboarding-name-backlight)"/>

  <!-- ==================== LAYER 2: GLASS CARD BACKDROP ==================== -->
  <rect x="10" y="10" width="360" height="260" rx="24" fill="url(#onboarding-name-glass)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1.2" filter="url(#onboarding-name-shadow)"/>
  
  <!-- Specular inner edge highlight -->
  <rect x="10.5" y="10.5" width="359" height="259" rx="23.5" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- ==================== LAYER 3: HEADER SECTION ==================== -->
  <g transform="translate(190, 48)" text-anchor="middle">
    <!-- Main Title -->
    <text y="0" font-family="'Inter', sans-serif" font-weight="700" font-size="20" fill="#ffffff">What should I call you?</text>
    
    <!-- Subtitle -->
    <text y="22" font-family="'Inter', sans-serif" font-weight="500" font-size="11.5" fill="#cbd5e1">This helps me personalize your investment experience.</text>
  </g>

  <!-- ==================== LAYER 4: FORM INPUT FIELDS ==================== -->
  <g transform="translate(30, 114)">
    <!-- Input: Enter your name (Placeholder state) -->
    <rect width="320" height="38" rx="10" fill="rgba(255, 255, 255, 0.02)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1"/>
    <text x="14" y="23" font-family="'Inter', sans-serif" font-weight="500" font-size="12" fill="#475569">Enter your name</text>
  </g>

  <!-- ==================== LAYER 5: ACTIONS GROUP WELL ==================== -->
  <g transform="translate(30, 172)">
    <!-- Continue Button (Disabled status: 35% opacity simulation) -->
    <g opacity="0.35">
      <rect width="320" height="38" rx="10" fill="rgba(255, 255, 255, 0.04)" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1"/>
      
      <!-- Label and Arrow Icon -->
      <g transform="translate(160, 0)">
        <text y="23" font-family="'Inter', sans-serif" font-weight="700" font-size="12" fill="#ffffff" text-anchor="middle">Continue</text>
        
        <!-- lucide-arrow-right (Indigo-500) -->
        <g transform="translate(30, 11)" stroke="#818cf8" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="2" y1="8" x2="14" y2="8"/>
          <path d="M9 3l5 5-5 5"/>
        </g>
      </g>
    </g>
  </g>

  <!-- ==================== LAYER 6: OUTSIDE NAVIGATION BUTTON ==================== -->
  <text x="190" y="306" font-family="'Inter', sans-serif" font-weight="500" font-size="12" fill="#64748b" text-anchor="middle">Back</text>
</svg>
