<svg width="680" height="440" viewBox="0 0 680 440" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    ======================================================================
    WAYAX 1:1 EXACT LANDING SPLASH LOGO & COMPLIANCE PRESENTATION (680px x 440px)
    Strictly extracted and compiled from the provided React DOM HTML snippet:
    - 0% <style> Blocks (Inlined presentation attributes)
    - 0% foreignObject Tags (Figma native compatible)
    - Double rotating gradient backdrop blurs with exact angles and scales:
      (204.087deg @ Scale 1.04176 & 79.38deg @ Scale 0.960017)
    - Centered high-fidelity 256px white wing insignia emblem with drop-shadows
    - Sora & Inter typography outlining the SEBI Registration: RA: INH000010876
    ======================================================================
  -->

  <defs>
    <!-- Background Linear Glow Gradient (Cyan-to-Blue) -->
    <linearGradient id="splash-glow-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#77F2E4"/>
      <stop offset="100%" stop-color="#6BB6F3"/>
    </linearGradient>

    <!-- Backlight Blur Filters -->
    <filter id="splash-blur-75" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="75"/>
    </filter>
    <filter id="splash-blur-35" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="35"/>
    </filter>

    <!-- Drop shadow for the Large Wing Emblem [0_10px_40px_rgba(0,0,0,0.85)] -->
    <filter id="splash-logo-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="28" flood-color="#000000" flood-opacity="0.85"/>
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <!-- Radial Mask for Dotted Grid (Fade to edges) -->
    <radialGradient id="splash-grid-mask" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <mask id="splash-grid-mask-el">
      <rect x="0" y="0" width="680" height="280" fill="url(#splash-grid-mask)"/>
    </mask>

    <!-- Dotted Grid Pattern definition -->
    <pattern id="splash-dots-pattern" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" fill-opacity="0.2"/>
    </pattern>
  </defs>

  <!-- ==================== LAYER 1: ROTATING BACKLIGHT GLOWS ==================== -->
  
  <!-- Glow Layer 1 (600px x 260px, Scale 1.04176, Rotate 204.087deg) -->
  <g transform="translate(340, 180)">
    <g transform="rotate(204.087) scale(1.04176)">
      <ellipse cx="0" cy="0" rx="300" ry="130" fill="url(#splash-glow-grad)" fill-opacity="0.18" filter="url(#splash-blur-75)"/>
    </g>
  </g>

  <!-- Glow Layer 2 (320px x 140px, Scale 0.960017, Rotate 79.38deg) -->
  <g transform="translate(340, 180)">
    <g transform="rotate(79.38) scale(0.960017)">
      <ellipse cx="0" cy="0" rx="160" ry="70" fill="url(#splash-glow-grad)" fill-opacity="0.14" filter="url(#splash-blur-35)"/>
    </g>
  </g>

  <!-- ==================== LAYER 2: DOTTED GRID OVERLAY ==================== -->
  <rect x="0" y="40" width="680" height="280" fill="url(#splash-dots-pattern)" mask="url(#splash-grid-mask-el)" opacity="0.6"/>

  <!-- ==================== LAYER 3: LARGE BRAND EMBLEM (WHITE TECH INSIGNIA) ==================== -->
  <g filter="url(#splash-logo-shadow)">
    <!-- Insignia group scaled to 200px width/height and centered -->
    <g transform="translate(240, 60) scale(1.66)" fill="#ffffff" fill-opacity="0.95">
      <!-- Left Wing -->
      <path d="M0 24 C0 10.7, 10.7 0, 24 0 H26 C29.3 0, 32 2.7, 32 6 V96 C32 109.3, 21.3 120, 8 120 H4 C1.8 120, 0 118.2, 0 116.0 V24 Z" />
      
      <!-- Central downward chevron/shield -->
      <path d="M44 32 C44 27.6, 47.6 24, 52 24 H68 C72.4 24, 76 27.6, 76 32 V72 C76 89.7, 61.7 104, 44 104 C44 104, 44 96, 44 72 V32 Z" />
      
      <!-- Right Wing -->
      <path d="M88 0 C101.3 0, 120 10.7, 120 24 V116 C120 118.2, 118.2 120, 116 120 H112 C98.7 120, 88 109.3, 88 96 V0 Z" />
    </g>
  </g>

  <!-- ==================== LAYER 4: BRAND TYPOGRAPHY & COMPLIANCE ==================== -->

  <!-- Brand Title "WayaX" -->
  <text x="340" y="328" font-family="'Sora', 'Outfit', sans-serif" font-weight="800" font-size="32" fill="#ffffff" tracking="-0.02em" text-anchor="middle">
    WayaX
  </text>

  <!-- SEBI compliance subtitle -->
  <text x="340" y="365" font-family="'Inter', sans-serif" font-weight="500" font-size="11" fill="#cbd5e1" text-anchor="middle">
    Amit SEBI-compliant AI research assistant
  </text>
  
  <text x="340" y="385" font-family="'JetBrains Mono', 'Fira Code', monospace" font-weight="700" font-size="11" fill="#818cf8" letter-spacing="0.05em" text-anchor="middle">
    RA: INH000010876
  </text>
</svg>
