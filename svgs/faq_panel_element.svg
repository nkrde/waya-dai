<svg width="360" height="600" viewBox="0 0 360 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    ======================================================================
    WAYAX 1:1 EXACT RIGHT FAQ COMPONENT CONSOLE (360px x 600px)
    Strictly extracted and compiled from the provided React DOM HTML snippet:
    - 0% <style> Blocks (Inlined presentation attributes)
    - 0% foreignObject Tags (Figma native compatible)
    - Premium subsurface frosted glass sidebar panel
    - Custom Lucide Icons: CircleQuestionMark, X, CircleAlert, ArrowUpRight, TrendingDown, Clock, Search
    - Fully organized nested categories and query pills mapped at precise coordinates
    ======================================================================
  -->

  <defs>
    <!-- Background Satin Panel Glass Gradient -->
    <linearGradient id="faq-glass-fill" x1="0" y1="0" x2="360" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d0e12" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#07080b" stop-opacity="0.94"/>
    </linearGradient>

    <!-- Specular button gradients -->
    <linearGradient id="faq-button-border" x1="0" y1="0" x2="328" y2="34" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>

    <!-- Premium Glow Dropshadow for overall FAQ console -->
    <filter id="faq-panel-shadow" x="-10%" y="-5%" width="120%" height="110%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- ==================== LAYER 1: FAQ PANEL BACKGROUND ==================== -->
  <rect width="360" height="600" rx="16" fill="url(#faq-glass-fill)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1.2" filter="url(#faq-panel-shadow)"/>
  
  <!-- Specular inner edge highlight -->
  <rect x="0.5" y="0.5" width="359" height="599" rx="15.5" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- ==================== LAYER 2: HEADER SECTION ==================== -->
  <g id="faq-header">
    <!-- Header title group -->
    <g transform="translate(16, 16)">
      <!-- lucide-circle-question-mark (Indigo pulse) -->
      <g stroke="#6366f1" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="8" cy="8" r="6.5"/>
        <path d="M5.5 5.5a2 2 0 0 1 3.4 0c0 1.2-1.7 1.8-1.7 1.8"/>
        <line x1="7.2" y1="10.8" x2="7.21" y2="10.8"/>
      </g>
      <text x="24" y="12" font-family="'Inter', sans-serif" font-weight="800" font-size="10.5" fill="#ffffff" letter-spacing="0.08em">FREQUENTLY ASKED</text>
    </g>

    <!-- Close button (X Icon) -->
    <g transform="translate(316, 12)">
      <circle cx="14" cy="14" r="14" fill="rgba(255, 255, 255, 0.04)" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1"/>
      <!-- lucide-x -->
      <path d="M10 10l8 8M18 10l-8 8" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round"/>
    </g>

    <!-- Header dividing border -->
    <line x1="0" y1="54" x2="360" y2="54" stroke="rgba(255, 255, 255, 0.06)" stroke-width="1"/>
  </g>

  <!-- ==================== LAYER 3: ADVISORY WARNING BANNER ==================== -->
  <g id="faq-banner" transform="translate(0, 54)">
    <rect width="360" height="36" fill="rgba(255, 255, 255, 0.02)"/>
    
    <!-- lucide-circle-alert (Amber-500) -->
    <g transform="translate(16, 10)" stroke="#f59e0b" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="8" cy="8" r="6.5"/>
      <line x1="8" y1="5" x2="8" y2="8"/>
      <line x1="8" y1="11" x2="8.01" y2="11"/>
    </g>
    
    <text x="36" y="21" font-family="'Inter', sans-serif" font-weight="500" font-size="9" fill="#94a3b8">Tap any query below to run instant SEBI-guided advisory analysis</text>

    <!-- Banner dividing border -->
    <line x1="0" y1="36" x2="360" y2="36" stroke="rgba(255, 255, 255, 0.06)" stroke-width="1"/>
  </g>

  <!-- ==================== LAYER 4: SCROLLABLE CATEGORIES CONTENT ==================== -->
  
  <!-- CATEGORY 1: Stocks to Buy -->
  <g id="cat-stocks-buy" transform="translate(16, 106)">
    <!-- Header row -->
    <g transform="translate(0, 0)">
      <!-- lucide-arrow-up-right -->
      <path d="M4 12h8M12 12V4M12 12L3 3" stroke="#34d399" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="18" y="10" font-family="'Inter', sans-serif" font-weight="700" font-size="9.5" fill="#94a3b8" letter-spacing="0.06em">STOCKS TO BUY</text>
    </g>

    <!-- Query button list -->
    <g transform="translate(0, 20)">
      <!-- Button 1 -->
      <g transform="translate(0, 0)">
        <rect width="328" height="32" rx="9" fill="rgba(255, 255, 255, 0.02)" stroke="url(#faq-button-border)" stroke-width="1"/>
        <text x="12" y="19" font-family="'Inter', sans-serif" font-weight="500" font-size="11" fill="#cbd5e1">Give me list of stocks I can buy</text>
      </g>
      
      <!-- Button 2 -->
      <g transform="translate(0, 38)">
        <rect width="328" height="32" rx="9" fill="rgba(255, 255, 255, 0.02)" stroke="url(#faq-button-border)" stroke-width="1"/>
        <text x="12" y="19" font-family="'Inter', sans-serif" font-weight="500" font-size="11" fill="#cbd5e1">Give me list of stocks that can give 10% returns...</text>
      </g>

      <!-- Button 3 -->
      <g transform="translate(0, 76)">
        <rect width="328" height="32" rx="9" fill="rgba(255, 255, 255, 0.02)" stroke="url(#faq-button-border)" stroke-width="1"/>
        <text x="12" y="19" font-family="'Inter', sans-serif" font-weight="500" font-size="11" fill="#cbd5e1">Give me 3 stocks in IT sector I can buy today</text>
      </g>
    </g>
  </g>

  <!-- CATEGORY 2: Short Selling -->
  <g id="cat-short-selling" transform="translate(16, 250)">
    <!-- Header row -->
    <g transform="translate(0, 0)">
      <!-- lucide-trending-down -->
      <g stroke="#f43f5e" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 11h4v-4"/>
        <path d="m16 11-6.5-6.5-3.5 3.5L2 3"/>
      </g>
      <text x="22" y="10" font-family="'Inter', sans-serif" font-weight="700" font-size="9.5" fill="#94a3b8" letter-spacing="0.06em">SHORT SELLING</text>
    </g>

    <!-- Query button list -->
    <g transform="translate(0, 20)">
      <!-- Button 1 -->
      <g transform="translate(0, 0)">
        <rect width="328" height="32" rx="9" fill="rgba(255, 255, 255, 0.02)" stroke="url(#faq-button-border)" stroke-width="1"/>
        <text x="12" y="19" font-family="'Inter', sans-serif" font-weight="500" font-size="11" fill="#cbd5e1">Give me 1 stock that I can short</text>
      </g>
      
      <!-- Button 2 -->
      <g transform="translate(0, 38)">
        <rect width="328" height="32" rx="9" fill="rgba(255, 255, 255, 0.02)" stroke="url(#faq-button-border)" stroke-width="1"/>
        <text x="12" y="19" font-family="'Inter', sans-serif" font-weight="500" font-size="11" fill="#cbd5e1">Which stocks can I short right now?</text>
      </g>
    </g>
  </g>

  <!-- CATEGORY 3: Long-term Picks -->
  <g id="cat-long-picks" transform="translate(16, 374)">
    <!-- Header row -->
    <g transform="translate(0, 0)">
      <!-- lucide-clock -->
      <g stroke="#3b82f6" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="8" cy="8" r="6.5"/>
        <path d="M8 4v4l2.5 1.5"/>
      </g>
      <text x="20" y="10" font-family="'Inter', sans-serif" font-weight="700" font-size="9.5" fill="#94a3b8" letter-spacing="0.06em">LONG-TERM PICKS</text>
    </g>

    <!-- Query button list -->
    <g transform="translate(0, 20)">
      <!-- Button 1 -->
      <g transform="translate(0, 0)">
        <rect width="328" height="32" rx="9" fill="rgba(255, 255, 255, 0.02)" stroke="url(#faq-button-border)" stroke-width="1"/>
        <text x="12" y="19" font-family="'Inter', sans-serif" font-weight="500" font-size="11" fill="#cbd5e1">Show me the multibagger portfolio picks</text>
      </g>
      
      <!-- Button 2 -->
      <g transform="translate(0, 38)">
        <rect width="328" height="32" rx="9" fill="rgba(255, 255, 255, 0.02)" stroke="url(#faq-button-border)" stroke-width="1"/>
        <text x="12" y="19" font-family="'Inter', sans-serif" font-weight="500" font-size="11" fill="#cbd5e1">What are your long-term wealth creation stock picks?</text>
      </g>
    </g>
  </g>

  <!-- CATEGORY 4: Track Record -->
  <g id="cat-track-record" transform="translate(16, 498)">
    <!-- Header row -->
    <g transform="translate(0, 0)">
      <!-- lucide-search -->
      <g stroke="#a855f7" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="6" cy="6" r="4.5"/>
        <line x1="9.5" y1="9.5" x2="13" y2="13"/>
      </g>
      <text x="20" y="10" font-family="'Inter', sans-serif" font-weight="700" font-size="9.5" fill="#94a3b8" letter-spacing="0.06em">TRACK RECORD</text>
    </g>

    <!-- Query button list -->
    <g transform="translate(0, 20)">
      <!-- Button 1 -->
      <g transform="translate(0, 0)">
        <rect width="328" height="32" rx="9" fill="rgba(255, 255, 255, 0.02)" stroke="url(#faq-button-border)" stroke-width="1"/>
        <text x="12" y="19" font-family="'Inter', sans-serif" font-weight="500" font-size="11" fill="#cbd5e1">What is your overall track record?</text>
      </g>
    </g>
  </g>
</svg>
