      <rect width="828" height="34" rx="10" fill="rgba(255, 255, 255, 0.02)" stroke="rgba(255, 255, 255, 0.06)" stroke-width="1"/>
      <circle cx="16" cy="17" r="3" fill="#6366f1" fill-opacity="0.6"/>
      <text x="28" y="21" font-family="'Inter', sans-serif" font-weight="500" font-size="12" fill="#cbd5e1">Give me 3 stocks in IT sector I can buy today</text>
      <text x="812" y="21" font-family="'JetBrains Mono', monospace" font-weight="600" font-size="9" fill="#475569" text-anchor="end">Select →</text>
