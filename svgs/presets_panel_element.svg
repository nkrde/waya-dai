<svg width="860" height="150" viewBox="0 0 860 150" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    ======================================================================
    WAYAX 1:1 EXACT PRESETS CARDS CONSOLE COMPONENT (860px x 150px)
    Strictly extracted from the provided React DOM HTML snippet:
    - 0% <style> Blocks (Inlined presentation attributes)
    - 0% foreignObject Tags (Figma native compatible)
    - 100% Exact Lucide Icons: QuestionMark, TrendingUp, AlertTriangle, Sparkles, Search, ChevronDown
    ======================================================================
  -->

  <defs>
    <!-- Light leak glowing border gradient -->
    <linearGradient id="presets-glow-border-exact" x1="0" y1="0" x2="860" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.6"/>
      <stop offset="12%" stop-color="#77F2E4" stop-opacity="0.4"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>

    <!-- Glass box-shadow specs matching liquid-glass-panel border-white/10 -->
    <filter id="presets-shadow-exact" x="-5%" y="-20%" width="110%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="40" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Card Body Panel representing relative z-30 rounded-xl md:rounded-[24px] -->
  <rect width="860" height="150" rx="24" fill="#0d0e12" fill-opacity="0.25" stroke="url(#presets-glow-border-exact)" stroke-width="1.2" filter="url(#presets-shadow-exact)"/>
  
  <!-- Specular top chamfer highlight line (1px white/10%) inside the card -->
  <rect x="0.5" y="0.5" width="859" height="149" rx="23.5" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Inner bottom specular shadow line (black 40%) -->
  <rect x="1" y="1" width="858" height="148" rx="23" fill="none" stroke="#000000" stroke-opacity="0.4" stroke-width="1.2"/>

  <!-- ==================== HEADER ROW ==================== -->
  
  <!-- Left Header: "CHAT PRESET" with miniature brand emblem logo image -->
  <g transform="translate(20, 18)">
    <image href="https://reduced-beige-7hamqau4r6.edgeone.app/a.png" x="0" y="0" width="16" height="16" brightness="1.1"/>
    <text x="24" y="12" font-family="'JetBrains Mono', monospace" font-weight="800" font-size="10.5" fill="#a5b4fc" letter-spacing="0.15em">CHAT PRESET</text>
  </g>

  <!-- Right Header: "CHECK ALL QUESTIONS" button capsule -->
  <g transform="translate(620, 10)">
    <rect width="220" height="30" rx="15" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    
    <!-- 1:1 Lucide Question Mark Icon -->
    <g transform="translate(12, 7)">
      <circle cx="8" cy="8" r="6" stroke="#818cf8" stroke-width="1.2" fill="none"/>
      <path d="M8 6a1.5 1.5 0 0 1 1.5 1.5c0 .7-.5 1-1 1.3v.7" stroke="#818cf8" stroke-width="1.2" stroke-linecap="round"/>
      <circle cx="8" cy="11.5" r="0.6" fill="#818cf8" stroke="none"/>
    </g>

    <text x="114" y="19" font-family="'Inter', sans-serif" font-weight="800" font-size="9.5" fill="#cbd5e1" letter-spacing="0.05em" text-anchor="middle">CHECK ALL QUESTIONS</text>
  </g>

  <!-- Horizontal divider border-b border-white/10 -->
  <line x1="20" y1="52" x2="840" y2="52" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>

  <!-- ==================== CATEGORIES HORIZONTAL PILLS ROW ==================== -->

  <g transform="translate(20, 68)">
    
    <!-- PILL 1: Stocks to Buy -->
    <g transform="translate(0, 0)">
      <rect width="144" height="34" rx="12" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
      
      <!-- 1:1 lucide-trending-up path -->
      <path d="M16 13h4v4m0-4l-6.5 6.5-3.5-3.5L4 19" stroke="#cbd5e1" stroke-opacity="0.75" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      
      <text x="76" y="21" font-family="'Inter', sans-serif" font-weight="700" font-size="11.5" fill="#cbd5e1" text-anchor="middle">Stocks to Buy</text>
      
      <!-- 1:1 lucide-chevron-down -->
      <path d="M116 19l2.5 2.5 2.5-2.5" stroke="#94a3b8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- PILL 2: Short Selling -->
    <g transform="translate(154, 0)">
      <rect width="144" height="34" rx="12" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
      
      <!-- 1:1 lucide-triangle-alert path -->
      <path d="M21 13l5 9H16l5-9z" stroke="#cbd5e1" stroke-opacity="0.75" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="21" y1="17" x2="21" y2="19" stroke="#cbd5e1" stroke-opacity="0.75" stroke-width="1.2"/>
      
      <text x="78" y="21" font-family="'Inter', sans-serif" font-weight="700" font-size="11.5" fill="#cbd5e1" text-anchor="middle">Short selling</text>
      
      <!-- 1:1 lucide-chevron-down -->
      <path d="M120 19l2.5 2.5 2.5-2.5" stroke="#94a3b8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- PILL 3: Long term picks -->
    <g transform="translate(308, 0)">
      <rect width="154" height="34" rx="12" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
      
      <!-- 1:1 lucide-sparkles path -->
      <path d="M14 20l2-4 4-2-4-2-2-4-2 4-4 2 4 2z" stroke="#cbd5e1" stroke-opacity="0.75" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M22 10l1-2 2-1-2-1-1-2-1 2-2 1 2 1z" stroke="#cbd5e1" stroke-opacity="0.75" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      
      <text x="82" y="21" font-family="'Inter', sans-serif" font-weight="700" font-size="11.5" fill="#cbd5e1" text-anchor="middle">Long term picks</text>
      
      <!-- 1:1 lucide-chevron-down -->
      <path d="M128 19l2.5 2.5 2.5-2.5" stroke="#94a3b8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- PILL 4: Track record -->
    <g transform="translate(472, 0)">
      <rect width="144" height="34" rx="12" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
      
      <!-- 1:1 lucide-search path with outline breathing glow indicator -->
      <g transform="translate(12, 9)">
        <circle cx="7" cy="7" r="5" stroke="#818cf8" stroke-width="1.2" fill="none"/>
        <line x1="10.5" y1="10.5" x2="14" y2="14" stroke="#818cf8" stroke-width="1.2" stroke-linecap="round"/>
      </g>
      
      <text x="80" y="21" font-family="'Inter', sans-serif" font-weight="700" font-size="11.5" fill="#cbd5e1" text-anchor="middle">Track record</text>
      
      <!-- 1:1 lucide-chevron-down -->
      <path d="M120 19l2.5 2.5 2.5-2.5" stroke="#94a3b8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- PILL 5: About Waya -->
    <g transform="translate(626, 0)">
      <rect width="138" height="34" rx="12" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
      
      <!-- Logo miniature image placement -->
      <image href="https://reduced-beige-7hamqau4r6.edgeone.app/a.png" x="12" y="10" width="14" height="14"/>
      
      <text x="76" y="21" font-family="'Inter', sans-serif" font-weight="700" font-size="11.5" fill="#cbd5e1" text-anchor="middle">About Waya</text>
      
      <!-- 1:1 lucide-chevron-down -->
      <path d="M114 19l2.5 2.5 2.5-2.5" stroke="#94a3b8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

  </g>
</svg>
