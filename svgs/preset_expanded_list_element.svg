      <text x="28" y="21" font-family="'Inter', sans-serif" font-weight="500" font-size="12" fill="#cbd5e1">Give me 2 Chemicals stocks to buy this week</text>
      <text x="812" y="21" font-family="'JetBrains Mono', monospace" font-weight="600" font-size="9" fill="#475569" text-anchor="end">Select →</text>
