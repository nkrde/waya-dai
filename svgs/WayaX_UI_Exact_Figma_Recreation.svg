<svg width="1000" height="600" viewBox="0 0 1000 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    ======================================================================
    WAYAX 1:1 PERFECT FIGMA EXTRACTION BLUEPRINT (NATIVE COMPATIBLE)
    Strict Transformations:
    - 0% foreignObject Tags (Figma drop-safe)
    - 0% <style> Blocks (Inlined Presentation Attributes)
    - Absolute coordinates (X, Y) for 100% identical placement
    ======================================================================
  -->

  <defs>
    <!-- Canvas backing dotted grid repeating 12px 12px exactly from index.css -->
    <pattern id="canvas-dot-grid" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.75" fill="#ffffff" fill-opacity="0.08"/>
    </pattern>

    <!-- Teal-to-Blue brand refraction stops -->
    <linearGradient id="brand-refraction-stops" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#77F2E4"/>
      <stop offset="100%" stop-color="#6BB6F3"/>
    </linearGradient>

    <!-- Amit greeting blue gradient stops -->
    <linearGradient id="greeting-blue-stops" x1="0" y1="0" x2="100" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>

    <!-- Liquid Glass linear backing gradient -->
    <linearGradient id="liquid-glass-backing" x1="0" y1="0" x2="860" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.035"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.01"/>
    </linearGradient>

    <!-- Ambient glowing backbacker caustics blurs -->
    <filter id="caustic-ambient-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>

    <!-- Specular shadow depth for card grids elevation -->
    <filter id="specular-drop-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="24" stdDeviation="32" flood-color="#000000" flood-opacity="0.65"/>
    </filter>
  </defs>

  <!-- Pitch Black backing canvas and repeating dotted pattern -->
  <rect width="1000" height="600" fill="#07080b"/>
  <rect width="1000" height="600" fill="url(#canvas-dot-grid)"/>

  <!-- Backlit polar flow glows behind components (Layer 1) -->
  <circle cx="500" cy="300" r="260" fill="#6366F1" fill-opacity="0.06" filter="url(#caustic-ambient-glow)"/>

  <!-- ==================== CENTRAL BRAND LOGO INSIGNIA (z-INDEX SANDWICH) ==================== -->
  <g transform="translate(460, 30)">
    <!-- Glass backer shield -->
    <rect width="80" height="80" rx="20" fill="url(#liquid-glass-backing)" stroke="#ffffff" stroke-opacity="0.09" stroke-width="1.2" filter="url(#specular-drop-shadow)"/>
    <line x1="0" y1="1" x2="80" y2="1" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1.2"/>
    
    <!-- Sub-surface refraction color bleeds masked -->
    <g clip-path="url(#emblem-clip-mask)">
      <ellipse cx="28" cy="40" rx="24" ry="12" fill="#77F2E4" fill-opacity="0.8" filter="url(#caustic-ambient-glow)"/>
      <ellipse cx="52" cy="41" rx="22" ry="13" fill="#6BB6F3" fill-opacity="0.8" filter="url(#caustic-ambient-glow)"/>
    </g>
    <clipPath id="emblem-clip-mask">
      <rect width="80" height="80" rx="20"/>
    </clipPath>

    <!-- Foreground Insignia Asset -->
    <image href="https://reduced-beige-7hamqau4r6.edgeone.app/a.png" x="16" y="16" width="48" height="48"/>
  </g>

  <!-- ==================== WELCOME HEADER TYPOGRAPHY ==================== -->
  <text x="500" y="152" font-family="'Sora', sans-serif" font-weight="800" font-size="28" fill="#ffffff" text-anchor="middle">
    Welcome to WayaX, <tspan fill="url(#greeting-blue-stops)">Amit</tspan>
  </text>
  <text x="500" y="176" font-family="'Inter', sans-serif" font-weight="500" font-size="12.5" fill="#64748b" text-anchor="middle">
    Select a preset below or enter a custom query to research breakouts.
  </text>

  <!-- ==================== MAIN DASHBOARD CONSOLE FRAME ==================== -->
  <g transform="translate(100, 210)">
    <!-- Outer Card border wrap -->
    <rect width="800" height="360" rx="32" fill="#ffffff" fill-opacity="0.003" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1.5" filter="url(#specular-drop-shadow)"/>

    <!-- ==================== CARD 1: INPUT WELL PANEL ==================== -->
    <g transform="translate(16, 16)">
      <!-- Indented black well backing -->
      <rect width="768" height="162" rx="24" fill="#000000" fill-opacity="0.24" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.2"/>
      
      <!-- Input Tag Header -->
      <text x="20" y="28" font-family="'JetBrains Mono', monospace" font-weight="800" font-size="9" fill="#818cf8" letter-spacing="0.15em">ASK WAYAX</text>
      <line x1="84" y1="24" x2="114" y2="24" stroke="#818cf8" stroke-opacity="0.25" stroke-width="1"/>

      <!-- Input placeholder display string -->
      <text x="20" y="68" font-family="'Inter', sans-serif" font-weight="600" font-size="14.5" fill="#cbd5e1">Show me long-term multibagger stock picks?</text>

      <!-- Divider line -->
      <line x1="20" y1="102" x2="748" y2="102" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

      <!-- Left Action Plus Button atom -->
      <g transform="translate(20, 114)">
        <circle cx="16" cy="16" r="16" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.2"/>
        <path d="M16 10v12M10 16h12" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>
      </g>

      <!-- Center Hide Presets glass button -->
      <g transform="translate(324, 114)">
        <rect width="120" height="32" rx="16" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.11" stroke-width="1.2"/>
        <line x1="12" y1="1" x2="108" y2="1" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.2"/>
        <!-- Circle indicator dot -->
        <circle cx="20" cy="16" r="4.5" stroke="#818cf8" stroke-width="1.2" fill="none"/>
        <path d="M20 14v2" stroke="#818cf8" stroke-width="1.2" stroke-linecap="round"/>
        <text x="68" y="20" font-family="'Inter', sans-serif" font-weight="800" font-size="9" fill="#ffffff" text-anchor="middle">Hide Presets ▲</text>
      </g>

      <!-- Right Action Send Arrow Button atom -->
      <g transform="translate(716, 114)">
        <circle cx="16" cy="16" r="16" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1.2"/>
        <path d="M16 22V10m0 0l-4 4m4-4l4 4" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>

    <!-- ==================== CARD 2: PRESETS console ==================== -->
    <g transform="translate(16, 194)">
      <!-- Console Base -->
      <rect width="768" height="150" rx="24" fill="#000000" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1.2"/>

      <!-- Console Header Tag Left -->
      <g transform="translate(20, 20)">
        <rect width="14" height="14" rx="4" fill="url(#liquid-glass-backing)" stroke="#ffffff" stroke-opacity="0.09" stroke-width="0.75"/>
        <image href="https://reduced-beige-7hamqau4r6.edgeone.app/a.png" x="2" y="2" width="10" height="10"/>
        <text x="22" y="11" font-family="'JetBrains Mono', monospace" font-weight="800" font-size="9" fill="#818cf8" letter-spacing="0.15em">CHAT PRESET</text>
      </g>

      <!-- Check All Questions active action button -->
      <g transform="translate(572, 14)">
        <rect width="176" height="28" rx="14" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.2"/>
        <circle cx="14" cy="14" r="4.5" stroke="#818cf8" stroke-width="1.2" fill="none"/>
        <path d="M14 12v2" stroke="#818cf8" stroke-width="1.2" stroke-linecap="round"/>
        <text x="94" y="17" font-family="'Inter', sans-serif" font-weight="800" font-size="9" fill="#a5b4fc" text-anchor="middle">CHECK ALL QUESTIONS</text>
      </g>

      <line x1="20" y1="56" x2="748" y2="56" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

      <!-- Categories filters pills row (1:1 aligned) -->
      <g transform="translate(20, 72)">
        <!-- Pill 1: Stocks to Buy -->
        <g transform="translate(0, 0)">
          <rect width="138" height="34" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
          <!-- Custom trend path icon -->
          <path d="M14 21l3-3 2 2 4-4m0 0h-3m3 0v3" stroke="#cbd5e1" stroke-width="1.2" stroke-linecap="round"/>
          <text x="76" y="21" font-family="'Inter', sans-serif" font-weight="700" font-size="11.5" fill="#cbd5e1" text-anchor="middle">Stocks to Buy ▾</text>
        </g>

        <!-- Pill 2: Short Selling -->
        <g transform="translate(148, 0)">
          <rect width="138" height="34" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
          <!-- Alert warning icon path -->
          <path d="M21 13l5 9H16l5-9z" stroke="#cbd5e1" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          <text x="78" y="21" font-family="'Inter', sans-serif" font-weight="700" font-size="11.5" fill="#cbd5e1" text-anchor="middle">Short selling ▾</text>
        </g>

        <!-- Pill 3: Long term picks -->
        <g transform="translate(296, 0)">
          <rect width="144" height="34" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
          <!-- Sparkles icon path -->
          <path d="M14 20l2-4 4-2-4-2-2-4-2 4-4 2 4 2z" stroke="#cbd5e1" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          <text x="82" y="21" font-family="'Inter', sans-serif" font-weight="700" font-size="11.5" fill="#cbd5e1" text-anchor="middle">Long term picks ▾</text>
        </g>

        <!-- Pill 4: Track record -->
        <g transform="translate(450, 0)">
          <rect width="132" height="34" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
          <circle cx="18" cy="17" r="4.5" fill="#ffffff" fill-opacity="0.08" stroke="none"/>
          <text x="74" y="21" font-family="'Inter', sans-serif" font-weight="700" font-size="11.5" fill="#cbd5e1" text-anchor="middle">Track record ▾</text>
        </g>

        <!-- Pill 5: About Waya -->
        <g transform="translate(592, 0)">
          <rect width="126" height="34" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
          <path d="M16 20h2m-1-4v4m0-8v.01" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>
          <text x="70" y="21" font-family="'Inter', sans-serif" font-weight="700" font-size="11.5" fill="#cbd5e1" text-anchor="middle">About Waya ▾</text>
        </g>
      </g>
    </g>
  </g>
</svg>
