<svg width="440" height="52" viewBox="0 0 440 52" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    ======================================================================
    WAYAX MAIN PAGE EXACT RECESSED SEARCH INPUT WELL COMPONENT
    ======================================================================
    A 1:1 single-element drop-in vector component representing the exact
    recessed search box element in the main page.
  -->
  <style>
    .search-input-placeholder {
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      font-weight: 500;
      font-size: 13px;
      fill: #cbd5e1;
    }
  </style>

  <!-- Recessed Input Well Shape -->
  <rect width="440" height="52" rx="16" fill="#040507" fill-opacity="0.9" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1.2"/>
  
  <!-- Sub-pixel inner specular shadow boundary -->
  <rect x="0.6" y="0.6" width="438.8" height="50.8" rx="15.4" fill="none" stroke="rgba(0, 0, 0, 0.45)" stroke-width="1.2"/>

  <!-- Search Placeholder Text -->
  <text x="18" y="31" class="search-input-placeholder">Search tickers (e.g. INFOSYS)...</text>

  <!-- Sky Blue Flow Magnifying Glass Vector Icon (1:1 Custom Path) -->
  <g transform="translate(398, 14)">
    <circle cx="9" cy="9" r="6" stroke="#6BB6F3" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="13.5" y1="13.5" x2="20" y2="20" stroke="#6BB6F3" stroke-width="1.8" stroke-linecap="round"/>
  </g>
</svg>
