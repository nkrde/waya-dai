<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    ======================================================================
    WAYAX BRAND LOGO INSIGNIA (NATIVE HIGH-FIDELITY VECTOR EXTRACTION)
    ======================================================================
    A 100% standard, pure vector-based recreation of the WayaX insignia.
    Includes exact inline styles, absolute coordinates, and premium HSL blurs
    for direct Figma drag-and-drop compatibility.
  -->
  
  <defs>
    <!-- Cyan subsurface glow -->
    <filter id="insignia-glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>

    <!-- Blue subsurface glow -->
    <filter id="insignia-glow-blue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>

    <!-- Drop shadow for the entire shield container -->
    <filter id="insignia-shield-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.65"/>
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.25"/>
    </filter>

    <!-- Linear glass gradient fill stops -->
    <linearGradient id="insignia-glass-gradient" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.01"/>
    </linearGradient>
  </defs>

  <!-- Grounding perfect dark background layer (Figma transparent canvas safe) -->
  <rect width="256" height="256" rx="64" fill="#07080b" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1.5"/>

  <!-- ==================== LAYER 1: UNDERLAY REFRACTION BLURS ==================== -->
  <!-- Teal Momentum Subsurface Glow -->
  <ellipse cx="96" cy="128" rx="80" ry="40" fill="#77F2E4" fill-opacity="0.75" filter="url(#insignia-glow-cyan)"/>
  
  <!-- Sky Blue Flow Subsurface Glow -->
  <ellipse cx="160" cy="128" rx="72" ry="42" fill="#6BB6F3" fill-opacity="0.75" filter="url(#insignia-glow-blue)"/>

  <!-- ==================== LAYER 2: FROSTED GLASS SHIELD CONTAINER ==================== -->
  <!-- Glass block with top specular highlight border -->
  <rect x="24" y="24" width="208" height="208" rx="52" fill="url(#insignia-glass-gradient)" stroke="rgba(255, 255, 255, 0.09)" stroke-width="1.5" filter="url(#insignia-shield-shadow)"/>
  
  <!-- Specular top chamfer highlight line -->
  <path d="M25 76 C 25 52, 52 25, 76 25 H 180 C 204 25, 231 52, 231 76" stroke="rgba(255, 255, 255, 0.28)" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- ==================== LAYER 3: EXACT GEOMETRIC BRAND INSIGNIA ==================== -->
  <!-- Centered high-fidelity white geometric tech logo emblem -->
  <g transform="translate(68, 64)" fill="#ffffff" fill-opacity="0.95">
    <!-- Left Wing -->
    <path d="M0 24 C0 10.7, 10.7 0, 24 0 H26 C29.3 0, 32 2.7, 32 6 V96 C32 109.3, 21.3 120, 8 120 H4 C1.8 120, 0 118.2, 0 116.0 V24 Z" />
    
    <!-- Central downward chevron/shield -->
    <path d="M44 32 C44 27.6, 47.6 24, 52 24 H68 C72.4 24, 76 27.6, 76 32 V72 C76 89.7, 61.7 104, 44 104 C44 104, 44 96, 44 72 V32 Z" />
    
    <!-- Right Wing -->
    <path d="M88 0 C101.3 0, 120 10.7, 120 24 V116 C120 118.2, 118.2 120, 116 120 H112 C98.7 120, 88 109.3, 88 96 V0 Z" />
  </g>
</svg>
