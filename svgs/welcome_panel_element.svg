<svg width="640" height="300" viewBox="0 0 640 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    ======================================================================
    WAYAX 1:1 EXACT BRAND HEADER & WELCOME PANEL COMPONENT (640px x 300px)
    Strictly extracted and compiled from the provided React DOM HTML snippet:
    - 0% <style> Blocks (Inlined presentation attributes)
    - 0% foreignObject Tags (Figma native compatible)
    - Precise rotating backlight glows with scale and rotation offsets
    - Dynamic dotted grid overlay with radial masking
    - Premium subsurface glass icon container with white tech emblem
    ======================================================================
  -->

  <defs>
    <!-- Background Linear Glow Gradient (Cyan-to-Blue) -->
    <linearGradient id="welcome-glow-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#77F2E4"/>
      <stop offset="100%" stop-color="#6BB6F3"/>
    </linearGradient>

    <!-- Welcome Greeting "Amit" Text Gradient (Blue-to-Indigo) -->
    <linearGradient id="welcome-text-gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>

    <!-- Glass Panel Specular Highlight Gradient -->
    <linearGradient id="welcome-glass-fill" x1="0" y1="0" x2="0" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>

    <linearGradient id="welcome-glass-border" x1="0" y1="0" x2="0" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08"/>
    </linearGradient>

    <!-- Backlight Blur Filters -->
    <filter id="welcome-blur-75" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="75"/>
    </filter>
    <filter id="welcome-blur-35" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="35"/>
    </filter>

    <!-- Glass Subsurface Blur Filters -->
    <filter id="glass-subsurface-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>

    <!-- Drop shadow for Premium Glass Frame [0_12px_40px_rgba(0,0,0,0.3)] -->
    <filter id="welcome-frame-shadow" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000000" flood-opacity="0.35"/>
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.15"/>
    </filter>

    <!-- Radial Mask for Dotted Grid (Fade to edges) -->
    <radialGradient id="welcome-grid-mask" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.39"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <mask id="welcome-grid-mask-el">
      <rect x="0" y="0" width="640" height="260" fill="url(#welcome-grid-mask)"/>
    </mask>

    <!-- Dotted Grid Pattern definition -->
    <pattern id="welcome-dots-pattern" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" fill-opacity="0.2"/>
    </pattern>
  </defs>

  <!-- ==================== LAYER 1: ROTATING BACKLIGHT GLOWS ==================== -->
  
  <!-- Glow Layer 1 (520px x 180px, Scale 1.04245, Rotate 170.558deg) -->
  <g transform="translate(320, 90)">
    <g transform="rotate(170.558) scale(1.04245)">
      <ellipse cx="0" cy="0" rx="260" ry="90" fill="url(#welcome-glow-grad)" fill-opacity="0.16" filter="url(#welcome-blur-75)"/>
    </g>
  </g>

  <!-- Glow Layer 2 (260px x 100px, Scale 1.02438, Rotate 170.483deg) -->
  <g transform="translate(320, 90)">
    <g transform="rotate(170.483) scale(1.02438)">
      <ellipse cx="0" cy="0" rx="130" ry="50" fill="url(#welcome-glow-grad)" fill-opacity="0.1152" filter="url(#welcome-blur-35)"/>
    </g>
  </g>

  <!-- ==================== LAYER 2: DOTTED GRID OVERLAY ==================== -->
  <rect x="0" y="0" width="640" height="200" fill="url(#welcome-dots-pattern)" mask="url(#welcome-grid-mask-el)" opacity="0.6"/>

  <!-- ==================== LAYER 3: PREMIUM GLASS SHIELD FRAME ==================== -->
  <!-- Main drop-shadowed & glass-filled container -->
  <g filter="url(#welcome-frame-shadow)">
    <!-- Base rounded card boundary (80px x 80px, rx=16) -->
    <rect x="280" y="50" width="80" height="80" rx="16" fill="url(#welcome-glass-fill)" stroke="url(#welcome-glass-border)" stroke-width="1.5"/>

    <!-- Subsurface refractive blurs inside card -->
    <g mask="url(#welcome-glass-clip)">
      <ellipse cx="295" cy="95" rx="20" ry="10" fill="#77F2E4" fill-opacity="0.25" filter="url(#glass-subsurface-blur)"/>
      <ellipse cx="345" cy="95" rx="18" ry="11" fill="#6BB6F3" fill-opacity="0.25" filter="url(#glass-subsurface-blur)"/>
    </g>

    <!-- Specular highlight line chamfer on glass frame -->
    <path d="M281 70 C 281 58, 292 51, 304 51 H 336 C 348 51, 359 58, 359 70" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1" stroke-linecap="round" fill="none"/>

    <!-- Exact Vector Brand Insignia (White Emblem, Scaled & Centered) -->
    <g transform="translate(300, 70) scale(0.333)" fill="#ffffff" fill-opacity="0.95">
      <!-- Left Wing -->
      <path d="M0 24 C0 10.7, 10.7 0, 24 0 H26 C29.3 0, 32 2.7, 32 6 V96 C32 109.3, 21.3 120, 8 120 H4 C1.8 120, 0 118.2, 0 116.0 V24 Z" />
      
      <!-- Central downward chevron/shield -->
      <path d="M44 32 C44 27.6, 47.6 24, 52 24 H68 C72.4 24, 76 27.6, 76 32 V72 C76 89.7, 61.7 104, 44 104 C44 104, 44 96, 44 72 V32 Z" />
      
      <!-- Right Wing -->
      <path d="M88 0 C101.3 0, 120 10.7, 120 24 V116 C120 118.2, 118.2 120, 116 120 H112 C98.7 120, 88 109.3, 88 96 V0 Z" />
    </g>
  </g>

  <!-- Clip path helper for glass inner blurs -->
  <clipPath id="welcome-glass-clip">
    <rect x="281" y="51" width="78" height="78" rx="15"/>
  </clipPath>

  <!-- ==================== LAYER 4: WELCOME TEXT PANEL ==================== -->
  
  <!-- Welcome Greeting Header -->
  <text x="320" y="172" font-family="'Sora', 'Outfit', 'Inter', sans-serif" font-weight="800" font-size="28" fill="#ffffff" tracking="-0.02em" text-anchor="middle">
    Welcome to WayaX, <tspan fill="url(#welcome-text-gradient)">Amit</tspan>
  </text>

  <!-- Description Caption -->
  <text x="320" y="208" font-family="'Inter', sans-serif" font-weight="500" font-size="12" fill="#94a3b8" text-anchor="middle">
    Select a preset below or enter a custom query
  </text>
  <text x="320" y="226" font-family="'Inter', sans-serif" font-weight="500" font-size="12" fill="#94a3b8" text-anchor="middle">
    to research breakouts.
  </text>
</svg>
