<svg width="380" height="380" viewBox="0 0 380 380" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    ======================================================================
    WAYAX 1:1 EXACT ONBOARDING LOGIN CARD COMPONENT - OTP STATE (380px x 380px)
    Strictly extracted and compiled from the provided React DOM HTML snippet:
    - 0% <style> Blocks (Inlined presentation attributes)
    - 0% foreignObject Tags (Figma native compatible)
    - Frosted glass onboarding panel base with 1px highlights
    - Phone Number input active state displaying value="j"
    - Enter OTP input in standard placeholder state
    - Complete action button group featuring "Verify OTP & Continue" layout and Lucide ArrowRight
    ======================================================================
  -->

  <defs>
    <!-- Background Satin Panel Glass Gradient -->
    <linearGradient id="onboarding-otp-glass" x1="0" y1="0" x2="380" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111318" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#07080b" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Glowing backlight underlay blur -->
    <filter id="onboarding-otp-backlight" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>

    <!-- Card shadow specification -->
    <filter id="onboarding-otp-shadow" x="-10%" y="-5%" width="120%" height="110%">
      <feDropShadow dx="0" dy="16" stdDeviation="32" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- ==================== LAYER 1: BACKLIGHT AMBIENCE ==================== -->
  <!-- Ambient background glow (Simulating w-80 h-80 blur-[100px] bg-indigo-500/2) -->
  <circle cx="190" cy="190" r="120" fill="#6366f1" fill-opacity="0.05" filter="url(#onboarding-otp-backlight)"/>

  <!-- ==================== LAYER 2: GLASS CARD BACKDROP ==================== -->
  <rect x="10" y="10" width="360" height="360" rx="24" fill="url(#onboarding-otp-glass)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1.2" filter="url(#onboarding-otp-shadow)"/>
  
  <!-- Specular inner edge highlight -->
  <rect x="10.5" y="10.5" width="359" height="359" rx="23.5" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- ==================== LAYER 3: HEADER SECTION ==================== -->
  <g transform="translate(190, 42)" text-anchor="middle">
    <!-- Main Title -->
    <text y="0" font-family="'Inter', sans-serif" font-weight="700" font-size="22" fill="#ffffff">Get Started</text>
    
    <!-- Subtitle -->
    <text y="20" font-family="'Inter', sans-serif" font-weight="500" font-size="12" fill="#94a3b8">Access your personalized advisory.</text>
    
    <!-- Account Provider Tagline -->
    <text y="38" font-family="'Inter', sans-serif" font-weight="700" font-size="9.5" fill="#818cf8" letter-spacing="0.08em">SIGN IN WITH WAYA ACCOUNT</text>
  </g>

  <!-- ==================== LAYER 4: FORM INPUT FIELDS ==================== -->
  <g transform="translate(30, 114)">
    <!-- Input 1: Phone Number (Active display displaying value="j") -->
    <g>
      <rect width="320" height="38" rx="10" fill="rgba(255, 255, 255, 0.02)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1"/>
      <text x="14" y="23" font-family="'Inter', sans-serif" font-weight="600" font-size="12" fill="#ffffff">j</text>
    </g>

    <!-- Input 2: Enter OTP (Standard placeholder state) -->
    <g transform="translate(0, 44)">
      <rect width="320" height="38" rx="10" fill="rgba(255, 255, 255, 0.02)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1"/>
      <text x="14" y="23" font-family="'Inter', sans-serif" font-weight="500" font-size="12" fill="#475569">Enter OTP</text>
    </g>
  </g>

  <!-- ==================== LAYER 5: ACTIONS GROUP WELL ==================== -->
  <g transform="translate(30, 212)">
    <!-- Verify OTP & Continue Button (Disabled status: 35% opacity simulation) -->
    <g opacity="0.35">
      <rect width="320" height="38" rx="10" fill="rgba(255, 255, 255, 0.04)" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1"/>
      
      <!-- Label and Arrow Icon -->
      <g transform="translate(160, 0)">
        <text y="23" font-family="'Inter', sans-serif" font-weight="700" font-size="12" fill="#ffffff" text-anchor="middle">Verify OTP &amp; Continue</text>
        
        <!-- lucide-arrow-right (Indigo-500) -->
        <g transform="translate(74, 11)" stroke="#818cf8" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="2" y1="8" x2="14" y2="8"/>
          <path d="M9 3l5 5-5 5"/>
        </g>
      </g>
    </g>

    <!-- Alternative Sign-in Password Button -->
    <text x="160" y="58" font-family="'Inter', sans-serif" font-weight="500" font-size="11" fill="#64748b" text-anchor="middle">Sign in with Password instead</text>

    <!-- Register Button (Disabled status: 30% opacity simulation) -->
    <g transform="translate(0, 72)" opacity="0.3">
      <rect width="320" height="38" rx="10" fill="transparent" stroke="transparent" stroke-width="1"/>
      <text x="160" y="23" font-family="'Inter', sans-serif" font-weight="700" font-size="12" fill="#94a3b8" text-anchor="middle">Register</text>
    </g>
  </g>
</svg>
